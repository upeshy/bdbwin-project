<!DOCTYPE html>
<html>
<head>
<title>Horizontal ID Card</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* HORIZONTAL CARD */
#idcard{
  width:520px;
  height:300px;
  display:none;
  margin:auto;
}

.id-box{
  width:100%;
  height:100%;
  display:flex;
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* LEFT SIDE */
.left{
  width:40%;
  background:#4b2c91;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.left img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:4px solid orange;
  object-fit:cover;
}

.left h3{
  margin-top:10px;
  font-size:16px;
}

/* RIGHT SIDE */
.right{
  width:60%;
  padding:15px;
  color:black;
  text-align:left;
}

.right h2{
  margin-bottom:10px;
  color:#4b2c91;
}

.right p{
  margin:5px 0;
  font-size:14px;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  right:20px;
  font-size:12px;
}
</style>
</head>

<body>

<h2>🪪 Horizontal ID Card</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="file" id="photoInput"><br>
<input type="text" id="father" placeholder="Father Name"><br>
<input type="text" id="class" placeholder="Class"><br>
<input type="text" id="mobile" placeholder="Mobile"><br>

<button onclick="generateID()">Generate ID</button>
<button id="downloadIDBtn" style="display:none" onclick="downloadID()">Download</button>

<!-- CARD -->
<div id="idcard">
  <div class="id-box">

    <!-- LEFT -->
    <div class="left">
      <img id="photo" src="">
      <h3 id="i_name"></h3>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h2>GCIT FOUNDATION</h2>

      <p><b>Student Name:</b> <span id="i_name2"></span></p>
      <p><b>Father Name:</b> <span id="i_father"></span></p>
      <p><b>Class:</b> <span id="i_class"></span></p>
      <p><b>Mobile:</b> <span id="i_mobile"></span></p>
      <p><b>Serial:</b> <span id="i_serial"></span></p>
    </div>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
let idPDF = null;

// SERIAL
function getNextSerial(){
  let current = localStorage.getItem("id_serial");
  current = current ? parseInt(current)+1 : 1;
  localStorage.setItem("id_serial", current);
  return current.toString().padStart(4,'0');
}

// PHOTO
function loadPhoto(callback){
  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
    callback();
  }
  reader.readAsDataURL(file);
}

// GENERATE
function generateID(){
  let name = document.getElementById("name").value;
  let father = document.getElementById("father").value;
  let cls = document.getElementById("class").value;
  let mobile = document.getElementById("mobile").value;

  if(!name || !father){
    alert("Fill required fields");
    return;
  }

  loadPhoto(function(){

    document.getElementById("i_name").innerText = name;
    document.getElementById("i_name2").innerText = name;
    document.getElementById("i_father").innerText = father;
    document.getElementById("i_class").innerText = cls;
    document.getElementById("i_mobile").innerText = mobile;
    document.getElementById("i_serial").innerText = getNextSerial();

    let card = document.getElementById("idcard");
    card.style.display = "block";

    setTimeout(()=>{
      html2canvas(card,{scale:3}).then(canvas=>{
        let img = canvas.toDataURL("image/png");

        // HORIZONTAL SIZE
        idPDF = new jsPDF('l','mm',[85.6,54]);

        idPDF.addImage(img,'PNG',0,0,85.6,54);

        document.getElementById("downloadIDBtn").style.display = "inline-block";
      });
    },500);

  });
}

// DOWNLOAD
function downloadID(){
  if(idPDF){
    idPDF.save("horizontal_idcard.pdf");
  }
}
</script>

</body>
</html>
