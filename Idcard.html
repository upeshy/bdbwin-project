<!DOCTYPE html>
<html>
<head>
<title>ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  text-align:center;
  color:white;
}

/* CARD */
#card{
  width:800px;
  height:300px;
  background:white;
  margin:auto;
  margin-top:20px;
  border-radius:15px;
  overflow:hidden;
  display:none;
  position:relative;
}

/* HEADER */
.top{
  background:#1e3c72;
  color:white;
  padding:10px;
  font-weight:bold;
  font-size:22px;
}
.sub{
  font-size:12px;
}

/* RED STRIP */
.strip{
  background:#e53935;
  color:white;
  text-align:center;
  padding:5px;
  font-weight:bold;
}

/* CONTENT */
.content{
  display:flex;
  padding:15px;
}

/* LEFT DETAILS */
.left{
  width:60%;
  text-align:left;
}
.left p{
  margin:6px 0;
  color:black;
}

/* RIGHT */
.right{
  width:40%;
  text-align:center;
}

/* PHOTO */
.photo{
  width:130px;
  height:130px;
  border-radius:50%;
  border:5px solid #1e3c72;
  object-fit:cover;
}

/* QR */
#qrcode{
  margin-top:10px;
}

/* SIGN */
.sign{
  margin-top:5px;
  color:black;
  font-style:italic;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:0;
  width:100%;
  background:#1e3c72;
  color:white;
  padding:8px;
  font-size:14px;
}

/* FORM */
input{
  padding:10px;
  margin:5px;
  width:250px;
}
button{
  padding:10px 15px;
  margin:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🪪 ID Card Generator</h2>

<input id="name" placeholder="Name"><br>
<input id="father" placeholder="Father Name"><br>
<input id="idno" placeholder="ID Number"><br>
<input id="class" placeholder="Class"><br>
<input id="dob" placeholder="DOB"><br>
<input id="contact" placeholder="Contact"><br>
<input id="address" placeholder="Address"><br>
<input type="file" id="photoInput"><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<!-- CARD -->
<div id="card">

  <div class="top">
    YOUR ACADEMY
    <div class="sub">This is an authorised branch of GCIT FOUNDATION</div>
  </div>

  <div class="strip">STUDENT ID CARD</div>

  <div class="content">

    <div class="left">
      <p><b>Name:</b> <span id="i_name"></span></p>
      <p><b>Father's Name:</b> <span id="i_father"></span></p>
      <p><b>ID No:</b> <span id="i_id"></span></p>
      <p><b>Class:</b> <span id="i_class"></span></p>
      <p><b>DOB:</b> <span id="i_dob"></span></p>
      <p><b>Contact:</b> <span id="i_contact"></span></p>
      <p><b>Address:</b> <span id="i_address"></span></p>
    </div>

    <div class="right">
      <img id="photo" class="photo">
      <div id="qrcode"></div>
      <div class="sign">Sumit Sharma<br>(Director)</div>
    </div>

  </div>

  <div class="footer">
    Address: 123 Main Street | Phone: 01234567890
  </div>

</div>

<script>
const { jsPDF } = window.jspdf;
let pdf;

// GENERATE
function generate(){

  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo first");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
  }
  reader.readAsDataURL(file);

  // Fill Data
  i_name.innerText = name.value;
  i_father.innerText = father.value;
  i_id.innerText = idno.value;
  i_class.innerText = class.value;
  i_dob.innerText = dob.value;
  i_contact.innerText = contact.value;
  i_address.innerText = address.value;

  // QR DATA
  let qrData = `
Name: ${name.value}
ID: ${idno.value}
Phone: ${contact.value}
`;

  // Clear old QR
  document.getElementById("qrcode").innerHTML = "";

  // Generate QR
  new QRCode(document.getElementById("qrcode"), {
    text: qrData,
    width: 80,
    height: 80
  });

  let card = document.getElementById("card");
  card.style.display = "block";

  // Convert to PDF
  setTimeout(()=>{
    html2canvas(card,{scale:3}).then(canvas=>{
      let img = canvas.toDataURL("image/png");

      pdf = new jsPDF('l','mm',[85.6,54]);
      pdf.addImage(img,'PNG',0,0,85.6,54);
    });
  },500);
}

// DOWNLOAD
function download(){
  if(pdf){
    pdf.save("ID-Card.pdf");
  }else{
    alert("Generate ID first");
  }
}
</script>

</body>
</html>
