<!DOCTYPE html>
<html>
<head>
<title>ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  text-align:center;
  color:white;
}

/* CARD */
#card{
  width:800px;
  height:490px;
  background:white;
  margin:auto;
  margin-top:20px;
  border-radius:15px;
  overflow:hidden;
  display:none;
  position:relative;
}

/* HEADER */
.top{
  background:#1e3c72;
  color:white;
  padding:10px;
  font-weight:bold;
  font-size:22px;
}
.sub{
  font-size:12px;
}

/* RED STRIP */
.strip{
  background:#e53935;
  color:white;
  text-align:center;
  padding:5px;
  font-weight:bold;
}

/* CONTENT */
.content{
  display:flex;
  padding:15px;
}

/* LEFT DETAILS */
.left{
  width:60%;
  text-align:left;
}
.left p{
  margin:6px 0;
  color:black;
}

/* RIGHT */
.right{
  width:40%;
  text-align:center;
}

/* PHOTO */
.photo{
  width:130px;
  height:130px;
  border-radius:50%;
  border:5px solid #1e3c72;
  object-fit:cover;
}

/* QR */
#qrcode{
  margin-top:10px;
}

/* SIGN */
.sign{
  margin-top:5px;
  color:black;
  font-style:italic;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:0;
  width:100%;
  height:75px;
  background:linear-gradient(90deg,#0f2f6b,#1e4fa3,#0f2f6b);
  color:white;
  overflow:hidden;
}

/* SVG WAVE */
.wave{
  position:absolute;
  top:-35px;
  left:0;
  width:100%;
  height:60px;
}

.wave path{
  fill:white;
}

/* CONTENT */
.footer-content{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:space-around;
  align-items:center;
  height:100%;
  font-size:13px;
  font-weight:500;
}
/* FORM */
input{
  padding:10px;
  margin:5px;
  width:250px;
}
button{
  padding:10px 15px;
  margin:10px;
  cursor:pointer;
}
  /* LEFT CONTAINER */
.left{
  width:60%;
  padding-left:15px;
}

/* EACH ROW */
.row{
  display:flex;
  align-items:center;
  margin:8px 0;
}

/* ICON */
.icon{
  width:30px;
  font-size:18px;
  text-align:center;
}

/* LABEL (Name, Father etc.) */
.label{
  width:150px;              /* 👈 fixed = perfect alignment */
  font-size:17px;
  font-weight:bold;
  color:#1e3c72;            /* blue like ID card */
}

/* COLON */
.colon{
  width:15px;
  text-align:center;
  font-size:17px;
}

/* VALUE */
.value{
  flex:1;
  font-size:18px;
  font-weight:500;
  color:black;
  word-break:break-word;   /* 👈 long text handle */
}

/* ADDRESS SPECIAL HANDLING */
.row:last-child{
  align-items:flex-start;   /* 👈 address top align */
}

.row:last-child .value{
  line-height:1.3;
}
</style>
</head>

<body>

<h2>🪪 ID Card Generator</h2>

<input id="name" placeholder="Name"><br>
<input id="father" placeholder="Father Name"><br>
<input id="idno" placeholder="ID Number"><br>
<input id="class" placeholder="Class-Course"><br>
<input id="branch" placeholder="Branch"><br>
<input id="contact" placeholder="Contact"><br>
<input id="address" placeholder="Address"><br>
<input type="file" id="photoInput"><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<!-- CARD -->
<div id="card">

  <div class="top">
    GCIT FOUNDATION
    
  </div>

  <div class="strip">STUDENT ID CARD</div>

  <div class="content">

    <div class="left">

  <div class="row">
    <span class="icon">👤</span>
    <span class="label">Student Name</span>
    <span class="colon">:</span>
    <span class="value" id="i_name"></span>
  </div>

  <div class="row">
    <span class="icon">👤</span>
    <span class="label">Father's Name</span>
    <span class="colon">:</span>
    <span class="value" id="i_father"></span>
  </div>

  <div class="row">
    <span class="icon">🆔</span>
    <span class="label">ID No.</span>
    <span class="colon">:</span>
    <span class="value" id="i_id"></span>
  </div>

  <div class="row">
    <span class="icon">🎓</span>
    <span class="label">Class-Course</span>
    <span class="colon">:</span>
    <span class="value" id="i_class"></span>
  </div>

  <div class="row">
    <span class="icon">🏫</span>
    <span class="label">Branch</span>
    <span class="colon">:</span>
    <span class="value" id="i_branch"></span>
  </div>

  <div class="row">
    <span class="icon">📞</span>
    <span class="label">Contact</span>
    <span class="colon">:</span>
    <span class="value" id="i_contact"></span>
  </div>

  <!-- ✅ NEW ADDRESS ROW -->
  <div class="row">
    <span class="icon">🏠</span>
    <span class="label">Address</span>
    <span class="colon">:</span>
    <span class="value" id="i_address"></span>
  </div>
    </div>


    <div class="right">
      <img id="photo" class="photo">
      <div id="qrcode"></div>
      <div class="sign">Sumit Sharma<br>(Director)</div>
    </div>

  </div>

  <div class="footer">

  <!-- WAVE SVG -->
  <svg viewBox="0 0 500 80" preserveAspectRatio="none" class="wave">
    <path d="M0,40 C150,80 350,0 500,40 L500,0 L0,0 Z"></path>
  </svg>

  <div class="footer-content">
    <span>🏠 Address: 123 Main Street, City, State - 123456</span>
    <span>📞 Phone: 89358 662290</span>
    <span>✉ Email: info@gcitfoundation.com</span>
  </div>

</div>



<script>
const { jsPDF } = window.jspdf;
let pdf;

function generate(){

  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo first");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(){

    document.getElementById("photo").src = reader.result;

    // Fill Data
    document.getElementById("i_name").innerText = document.getElementById("name").value;
    document.getElementById("i_father").innerText = document.getElementById("father").value;
    document.getElementById("i_id").innerText = document.getElementById("idno").value;
    document.getElementById("i_class").innerText = document.getElementById("class").value;
    document.getElementById("i_branch").innerText = document.getElementById("branch").value;
    document.getElementById("i_contact").innerText = document.getElementById("contact").value;
    document.getElementById("i_address").innerText = document.getElementById("address").value;

    // QR Data
    let qrData = `
Name: ${document.getElementById("name").value}
ID: ${document.getElementById("idno").value}
Phone: ${document.getElementById("contact").value}
`;

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
      text: qrData,
      width: 90,
      height: 90
    });

    let card = document.getElementById("card");
    card.style.display = "block";

    setTimeout(()=>{
      html2canvas(card,{scale:3}).then(canvas=>{
        let img = canvas.toDataURL("image/png");

        pdf = new jsPDF('l','mm',[85.6,54]);
        pdf.addImage(img,'PNG',0,0,85.6,54);
      });
    },500);

  };

  reader.readAsDataURL(file);
}

// DOWNLOAD
function download(){
  if(pdf){
    pdf.save("ID-Card.pdf");
  }else{
    alert("Generate ID first");
  }
}
</script>

</body>
</html>
