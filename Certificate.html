<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:6px;
  width:260px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* HIDE BUTTON PDF */
.no-print{ position:absolute; top:10px; right:15px; cursor:pointer; }
.hide{ display:none !important; }

/* ================= CERTIFICATE ================= */
#certificate{
  width:1000px;
  height:600px;
  display:none;
}

.cert{
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff,#f8f3e6);
  border:15px solid gold;
  padding:60px 40px;
  position:relative;
  box-sizing:border-box;
}

/* CORNER DESIGN */
.cert:before{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:250px;
  height:250px;
  background:linear-gradient(45deg,#ffd700,#8b0000);
  border-bottom-left-radius:200px;
}

/* LOGO */
.logo{
  position:absolute;
  top:40px;
  left:40px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:black;
  color:#ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border:5px solid gold;
}

/* TEXT */
.cert h1{
  font-size:55px;
  color:#6b0000;
}

.name{
  font-size:48px;
  color:#8b0000;
  margin:20px 0;
  font-family:Georgia;
}

.desc{
  width:75%;
  margin:auto;
  color:#333;
}

/* SIGN */
.sign-area{
  position:absolute;
  bottom:40px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.sign-box hr{
  width:180px;
  border:1px solid black;
}

/* ================= ID CARD ================= */
#idcard{
  width:320px;
  height:260px;
  display:none;
}

.id-box{
  width:100%;
  height:100%;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  text-align:left;
}

.id-header{
  background:#4a2ea0;
  color:white;
  text-align:center;
  padding:6px;
  font-weight:bold;
}

#photo{
  width:80px;
  height:80px;
  border-radius:50%;
  display:block;
  margin:10px auto;
}

.details{
  font-size:13px;
  margin-top:5px;
}

.details span{
  display:block;
  margin:2px 0;
}

.id-sign{
  text-align:center;
  margin-top:5px;
}

.id-sign hr{
  width:100px;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input id="name" placeholder="Student Name"><br>
<input id="course" placeholder="Course"><br>
<input id="id" placeholder="Student ID"><br>
<input id="father" placeholder="Father Name"><br>
<input id="dob" placeholder="DOB"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="address" placeholder="Address"><br>
<input type="file" id="photoInput"><br>

<button onclick="generateCertificate()">🎓 Certificate</button>
<button onclick="generateID()">🪪 ID Card</button>

<br>

<button id="downloadCertBtn" style="display:none" onclick="downloadCert()">Download Certificate</button>
<button id="downloadIDBtn" style="display:none" onclick="downloadID()">Download ID</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert">

    <div class="no-print" id="certClose" onclick="closeCertificate()">❌</div>

    <div class="logo">GCIT</div>

    <h1>CERTIFICATE</h1>
    <p>This Certificate is proudly presented to</p>

    <div id="c_name" class="name"></div>

    <p class="desc">
      Successfully completed <b id="c_course"></b>
    </p>

    <p><b>ID: <span id="c_id"></span></b></p>

    <div class="sign-area">
      <div class="sign-box">
        <hr>Student Signature
      </div>
      <div class="sign-box">
        <hr>Director Signature
      </div>
    </div>

  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">

    <div class="no-print" id="idClose" onclick="closeID()">❌</div>

    <div class="id-header">GCIT FOUNDATION</div>

    <img id="photo">

    <h3 id="i_name" style="text-align:center;"></h3>

    <div class="details">
      <span>Course: <b id="i_course"></b></span>
      <span>ID: <b id="i_id"></b></span>
      <span>Father: <b id="i_father"></b></span>
      <span>DOB: <b id="i_dob"></b></span>
      <span>Mobile: <b id="i_mobile"></b></span>
      <span>Address: <b id="i_address"></b></span>
    </div>

    <div class="id-sign">
      <hr>Signature
    </div>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

let certPDF, idPDF;

// PHOTO
function loadPhoto(callback){
  let file = document.getElementById("photoInput").files[0];
  let reader = new FileReader();
  reader.onload = ()=>{
    document.getElementById("photo").src = reader.result;
    callback();
  };
  reader.readAsDataURL(file);
}

// CERTIFICATE
function generateCertificate(){
  document.getElementById("c_name").innerText = name.value;
  document.getElementById("c_course").innerText = course.value;
  document.getElementById("c_id").innerText = id.value;

  certificate.style.display="block";
  certClose.classList.add("hide");

  html2canvas(certificate).then(canvas=>{
    certPDF = new jsPDF('landscape');
    certPDF.addImage(canvas.toDataURL(),"PNG",10,10,280,180);
    downloadCertBtn.style.display="inline-block";
    certClose.classList.remove("hide");
  });
}

// ID CARD
function generateID(){
  loadPhoto(()=>{
    i_name.innerText = name.value;
    i_course.innerText = course.value;
    i_id.innerText = id.value;
    i_father.innerText = father.value;
    i_dob.innerText = dob.value;
    i_mobile.innerText = mobile.value;
    i_address.innerText = address.value;

    idcard.style.display="block";
    idClose.classList.add("hide");

    html2canvas(idcard).then(canvas=>{
      idPDF = new jsPDF();
      idPDF.addImage(canvas.toDataURL(),"PNG",10,10,90,70);
      downloadIDBtn.style.display="inline-block";
      idClose.classList.remove("hide");
    });
  });
}

// DOWNLOAD
function downloadCert(){ certPDF.save(name.value+"_certificate.pdf"); }
function downloadID(){ idPDF.save(name.value+"_id.pdf"); }

// CLOSE
function closeCertificate(){ certificate.style.display="none"; }
function closeID(){ idcard.style.display="none"; }
</script>

</body>
</html>
