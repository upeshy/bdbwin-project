<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
}

/* INPUT */
input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  background:#ff5722;
  color:white;
  border:none;
  border-radius:6px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.close{
  position:absolute;
  top:10px;
  right:20px;
  background:red;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}

/* CERTIFICATE */
.cert{
  width:900px;
  height:550px;
  background:white;
  color:black;
  border:10px solid gold;
  text-align:center;
  padding:30px;
  position:relative;
}

.cert h1{
  color:#7b0000;
  font-size:40px;
}

.name{
  font-size:35px;
  margin:20px;
  font-weight:bold;
}

/* ID CARD */
.id{
  width:300px;
  height:180px;
  background:white;
  color:black;
  border-radius:10px;
  text-align:center;
  padding:10px;
}

.id-header{
  background:#ff5722;
  color:white;
  padding:5px;
}

#photo{
  width:70px;
  height:70px;
  border-radius:50%;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input id="name" placeholder="Name"><br>
<input id="course" placeholder="Course"><br>
<input id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<button onclick="previewCert()">Preview Certificate</button>
<button onclick="downloadCert()">Download Certificate</button><br>

<button onclick="previewID()">Preview ID</button>
<button onclick="downloadID()">Download ID</button>

<!-- CERTIFICATE POPUP -->
<div id="certPopup" class="popup">
  <div class="close" onclick="closePopup('certPopup')">X</div>
  <div id="certBox" class="cert">

    <h1>CERTIFICATE</h1>
    <p>This is to certify</p>

    <div id="c_name" class="name"></div>

    <p>Completed course</p>
    <h3 id="c_course"></h3>

    <br><br>

    <p style="font-family:cursive;">Signature</p>
    <hr style="width:150px;">
    <p>Director</p>

  </div>
</div>

<!-- ID POPUP -->
<div id="idPopup" class="popup">
  <div class="close" onclick="closePopup('idPopup')">X</div>
  <div id="idBox" class="id">

    <div class="id-header">GCIT FOUNDATION</div>

    <img id="photo"><br>

    <h3 id="i_name"></h3>
    <p id="i_course"></p>

    <b>ID: <span id="i_id"></span></b>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

/* PREVIEW CERT */
function previewCert(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;

  document.getElementById("c_name").innerText = name;
  document.getElementById("c_course").innerText = course;

  document.getElementById("certPopup").style.display="flex";
}

/* DOWNLOAD CERT */
function downloadCert(){
  html2canvas(document.getElementById("certBox")).then(canvas=>{
    let img = canvas.toDataURL("image/png");

    let pdf = new jsPDF({
      orientation:"landscape",
      unit:"px",
      format:[900,550]   // EXACT SIZE → NO CUT
    });

    pdf.addImage(img,'PNG',0,0,900,550);
    pdf.save("certificate.pdf");
  });
}

/* PREVIEW ID */
function previewID(){
  let file = document.getElementById("photoInput").files[0];

  let reader = new FileReader();
  reader.onload = function(){

    document.getElementById("photo").src = reader.result;
    document.getElementById("i_name").innerText =
      document.getElementById("name").value;

    document.getElementById("i_course").innerText =
      document.getElementById("course").value;

    document.getElementById("i_id").innerText =
      document.getElementById("id").value;

    document.getElementById("idPopup").style.display="flex";
  }

  if(file) reader.readAsDataURL(file);
}

/* DOWNLOAD ID */
function downloadID(){
  html2canvas(document.getElementById("idBox")).then(canvas=>{
    let img = canvas.toDataURL("image/png");

    let pdf = new jsPDF({
      unit:"px",
      format:[300,180]   // EXACT SIZE → NO CUT
    });

    pdf.addImage(img,'PNG',0,0,300,180);
    pdf.save("idcard.pdf");
  });
}

/* CLOSE */
function closePopup(id){
  document.getElementById(id).style.display="none";
}
</script>

</body>
</html>
