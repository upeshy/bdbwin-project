<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:8px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* CERTIFICATE */
#certificate{
  width:1000px;
  height:600px;
  display:none;
  margin:auto;
}

.cert{
  width:100%;
  height:100%;
  background:white;
  border:12px solid gold;
  position:relative;
  text-align:center;
  padding:40px;
}

.logo{
  position:absolute;
  top:30px;
  left:30px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:black;
  color:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  border:4px solid gold;
}

.cert h1{
  font-size:45px;
  color:#7b0000;
}

.name{
  font-size:35px;
  margin:20px 0;
}

.sign{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

/* ID CARD */
#idcard{
  width:320px;
  display:none;
  margin:auto;
}

.id-box{
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
}

.id-header{
  background:#ff5722;
  color:white;
  padding:5px;
  border-radius:5px;
}

#photo{
  width:80px;
  height:80px;
  border-radius:50%;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="course" placeholder="Course"><br>
<input type="text" id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<!-- BUTTONS -->
<button onclick="previewCertificate()">👁 Preview Certificate</button>
<button onclick="downloadCertificate()">⬇ Download Certificate</button><br>

<button onclick="previewID()">👁 Preview ID Card</button>
<button onclick="downloadID()">⬇ Download ID Card</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert">
    <div class="logo">GCIT<br>FOUNDATION</div>

    <h1>CERTIFICATE</h1>
    <p>This is to certify</p>

    <h2 id="c_name" class="name"></h2>

    <p>Completed course</p>
    <h3 id="c_course"></h3>

    <div class="sign">
      <h3 style="font-family:cursive;">Upesh Kumar</h3>
      <hr>
      <span>Director</span>
    </div>
  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">
    <div class="id-header">GCIT FOUNDATION</div>

    <img id="photo"><br>

    <h3 id="i_name"></h3>
    <p id="i_course"></p>

    <p style="font-weight:bold;">
      Student ID: <span id="i_id"></span>
    </p>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

// PREVIEW CERTIFICATE
function previewCertificate(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;

  if(!name || !course){
    alert("Fill all fields");
    return;
  }

  document.getElementById("c_name").innerText = name;
  document.getElementById("c_course").innerText = course;

  document.getElementById("certificate").style.display = "block";
}

// DOWNLOAD CERTIFICATE
function downloadCertificate(){
  let cert = document.getElementById("certificate");

  if(cert.style.display === "none"){
    alert("पहले Preview दिखाओ");
    return;
  }

  html2canvas(cert).then(canvas=>{
    let pdf = new jsPDF('landscape');
    pdf.addImage(canvas.toDataURL("image/png"),'PNG',10,10,280,150);
    pdf.save("certificate.pdf");
  });
}

// PREVIEW ID
function previewID(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;
  let id = document.getElementById("id").value;

  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
    document.getElementById("i_name").innerText = name;
    document.getElementById("i_course").innerText = course;
    document.getElementById("i_id").innerText = id;

    document.getElementById("idcard").style.display = "block";
  }
  reader.readAsDataURL(file);
}

// DOWNLOAD ID
function downloadID(){
  let card = document.getElementById("idcard");

  if(card.style.display === "none"){
    alert("पहले Preview दिखाओ");
    return;
  }

  html2canvas(card).then(canvas=>{
    let pdf = new jsPDF();
    pdf.addImage(canvas.toDataURL("image/png"),'PNG',10,10,80,50);
    pdf.save("idcard.pdf");
  });
}
</script>

</body>
</html>
