<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* CERTIFICATE */
#certificate{
  width:1123px;
  height:794px;
  display:none;
}

.cert-bg{
  width:100%;
  height:100%;
  background:url('certificate-bg.jpg') no-repeat center;
  background-size:cover;
  position:relative;
  font-family:Arial;
}

/* TEXT POSITIONING */
.text{
  position:absolute;
  width:100%;
  text-align:center;
  color:#000;
}

/* NAME */
.name{
  top:330px;
  font-size:28px;
  font-weight:bold;
}

/* COURSE */
.course{
  top:380px;
  font-size:18px;
}

/* SERIAL */
.serial{
  top:120px;
  left:100px;
  position:absolute;
  font-size:14px;
}

/* CLOSE */
.no-print{
  position:absolute;
  top:10px;
  right:15px;
  color:red;
  cursor:pointer;
  font-size:20px;
}

/* ID CARD SAME */
#idcard{
  width:350px;
  height:520px;
  display:none;
}

.id-box{
  width:100%;
  height:100%;
  border-radius:20px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.id-top{
  width:100%;
  background:#4b2c91;
  color:white;
  padding:15px;
}

.photo-wrap img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:5px solid orange;
  margin-top:15px;
}

.details{
  color:black;
  padding:10px;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input id="name" placeholder="Student Name"><br>
<input id="course" placeholder="Course"><br>
<input id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<input id="father" placeholder="Father Name"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="address" placeholder="Address"><br>

<button onclick="generateCertificate()">🎓 Generate Certificate</button>
<button onclick="generateID()">🪪 Generate ID</button>

<br>

<button id="downloadCertBtn" style="display:none" onclick="downloadCert()">⬇ Download Certificate</button>
<button id="downloadIDBtn" style="display:none" onclick="downloadID()">⬇ Download ID</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert-bg">

    <div class="no-print" onclick="closeCertificate()">❌</div>

    <div class="serial">Certificate No: <span id="c_serial"></span></div>

    <div class="text name" id="c_name"></div>
    <div class="text course">has successfully completed the course <b id="c_course"></b></div>

  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">
    <div class="id-top">GCIT FOUNDATION</div>
    <div class="photo-wrap"><img id="photo"></div>
    <h3 id="i_name"></h3>
    <div class="details">
      Father: <span id="i_father"></span><br>
      Mobile: <span id="i_mobile"></span><br>
      Address: <span id="i_address"></span>
    </div>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
let certPDF,idPDF;

function getNextSerial(){
  let s=localStorage.getItem("cert")||0;
  s++; localStorage.setItem("cert",s);
  return String(s).padStart(4,'0');
}

function generateCertificate(){
  let name=nameInput(), course=courseInput();
  if(!name||!course){ alert("Fill fields"); return; }

  document.getElementById("c_name").innerText=name;
  document.getElementById("c_course").innerText=course;
  document.getElementById("c_serial").innerText=getNextSerial();

  let cert=document.getElementById("certificate");
  cert.style.display="block";

  html2canvas(cert,{scale:3}).then(c=>{
    let img=c.toDataURL("image/png");
    certPDF=new jsPDF('landscape','mm','a4');
    certPDF.addImage(img,'PNG',0,0,297,210);
    downloadCertBtn.style.display="inline-block";
  });
}

function generateID(){
  let file=photoInput.files[0];
  if(!file){alert("Upload photo");return;}

  let r=new FileReader();
  r.onload=()=>{
    photo.src=r.result;
    i_name.innerText=nameInput();
    i_father.innerText=father.value;
    i_mobile.innerText=mobile.value;
    i_address.innerText=address.value;

    let card=idcard;
    card.style.display="block";

    setTimeout(()=>{
      html2canvas(card,{scale:3}).then(c=>{
        let img=c.toDataURL("image/png");
        idPDF=new jsPDF('p','mm',[54,85.6]);
        idPDF.addImage(img,'PNG',0,0,54,85.6);
        downloadIDBtn.style.display="inline-block";
      });
    },500);
  }
  r.readAsDataURL(file);
}

function downloadCert(){ certPDF.save(nameInput()+"_certificate.pdf"); }
function downloadID(){ idPDF.save(nameInput()+"_id.pdf"); }

function closeCertificate(){ certificate.style.display="none"; }

function nameInput(){ return name.value; }
function courseInput(){ return course.value; }
</script>

</body>
</html>
