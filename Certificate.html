<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* CLOSE BUTTON */
.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  color:red;
  cursor:pointer;
  font-weight:bold;
  z-index:10;
}

/* CERTIFICATE */
#certificate{
  width:1000px;
  height:600px;
  display:none;
}

.cert{
  width:100%;
  height:100%;
  background:#fff;
  border:12px solid gold;
  position:relative;
  padding:40px;
  box-sizing:border-box;
}

/* CUT MARK */
.cut-border{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  bottom:10px;
  border:2px dashed red;
}

/* DESIGN */
.top-design{
  position:absolute;
  top:0;
  right:0;
  width:300px;
  height:150px;
  background:linear-gradient(45deg,#ff0000,#b71c1c,#ffd700);
  border-bottom-left-radius:100px;
}

/* LOGO */
.logo{
  position:absolute;
  top:40px;
  left:40px;
  width:130px;
  height:130px;
  border-radius:50%;
  background:black;
  color:#ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  font-weight:bold;
  border:5px solid gold;
}

.cert h1{
  font-size:50px;
  color:#7b0000;
}

.cert h2{
  color:#7b0000;
}

.name{
  font-size:40px;
  margin:20px 0;
}

.desc{
  width:70%;
  margin:auto;
  color:#444;
}

.sign{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

/* ID CARD */
#idcard{
  width:320px;
  height:200px;
  display:none;
}

.id-box{
  width:100%;
  height:100%;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  position:relative;
}

/* CUT MARK ID */
.id-cut{
  position:absolute;
  top:5px;
  left:5px;
  right:5px;
  bottom:5px;
  border:1px dashed red;
}

.id-header{
  background:#ff5722;
  color:white;
  padding:5px;
}

#photo{
  width:80px;
  height:80px;
  border-radius:50%;
  margin:10px 0;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="course" placeholder="Course"><br>
<input type="text" id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<button onclick="generateCertificate()">🎓 Generate Certificate</button>
<button onclick="generateID()">🪪 Generate ID Card</button>

<br>

<button id="downloadCertBtn" style="display:none" onclick="downloadCert()">⬇ Download Certificate</button>
<button id="downloadIDBtn" style="display:none" onclick="downloadID()">⬇ Download ID Card</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert">

    <div class="close-btn" onclick="closeCertificate()">❌</div>
    <div class="cut-border"></div>

    <div class="top-design"></div>

    <div class="logo">
      GCIT<br>FOUNDATION
    </div>

    <h1>CERTIFICATE</h1>
    <h2>OF ACHIEVEMENT</h2>

    <p>This Certificate Is Presented To</p>

    <h2 id="c_name" class="name"></h2>

    <p class="desc">
      Successfully completed <b id="c_course"></b>
    </p>

    <div class="sign">
      <hr>
      Director
    </div>

  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">

    <div class="close-btn" onclick="closeID()">❌</div>
    <div class="id-cut"></div>

    <div class="id-header">GCIT FOUNDATION</div>

    <img src="" id="photo">

    <h3 id="i_name"></h3>
    <p id="i_course"></p>
    <p>ID: <span id="i_id"></span></p>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

let certPDF = null;
let idPDF = null;

// PHOTO
function loadPhoto(callback){
  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo first");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
    callback();
  }
  reader.readAsDataURL(file);
}

// CERTIFICATE
function generateCertificate(){
  let name = nameInput();
  let course = courseInput();
  let id = idInput();

  if(!name || !course || !id){
    alert("Fill all fields");
    return;
  }

  document.getElementById("c_name").innerText = name;
  document.getElementById("c_course").innerText = course;

  let cert = document.getElementById("certificate");
  cert.style.display = "block";

  html2canvas(cert,{scale:2}).then(canvas=>{
    let img = canvas.toDataURL("image/png");
    certPDF = new jsPDF('landscape','mm','a4');
    certPDF.addImage(img,'PNG',5,5,287,200);

    document.getElementById("downloadCertBtn").style.display = "inline-block";
  });
}

// ID CARD
function generateID(){
  let name = nameInput();
  let course = courseInput();
  let id = idInput();

  if(!name || !course || !id){
    alert("Fill all fields");
    return;
  }

  loadPhoto(function(){
    document.getElementById("i_name").innerText = name;
    document.getElementById("i_course").innerText = course;
    document.getElementById("i_id").innerText = id;

    let card = document.getElementById("idcard");
    card.style.display = "block";

    html2canvas(card,{scale:2}).then(canvas=>{
      let img = canvas.toDataURL("image/png");
      idPDF = new jsPDF();
      idPDF.addImage(img,'PNG',10,10,90,60);

      document.getElementById("downloadIDBtn").style.display = "inline-block";
    });
  });
}

// DOWNLOAD
function downloadCert(){
  if(certPDF){
    certPDF.save(nameInput()+"_certificate.pdf");
  }
}

function downloadID(){
  if(idPDF){
    idPDF.save(nameInput()+"_idcard.pdf");
  }
}

// CLOSE
function closeCertificate(){
  document.getElementById("certificate").style.display = "none";
}

function closeID(){
  document.getElementById("idcard").style.display = "none";
}

// INPUT
function nameInput(){ return document.getElementById("name").value; }
function courseInput(){ return document.getElementById("course").value; }
function idInput(){ return document.getElementById("id").value; }
</script>

</body>
</html>
