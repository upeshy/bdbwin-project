<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:8px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* CERTIFICATE */
#certificate{
  width:1000px;
  height:600px;
  display:none;
}

.cert{
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff,#f7f7f7);
  border:12px solid gold;
  position:relative;
  text-align:center;
  padding:40px;
  box-sizing:border-box;
}

.top-design{
  position:absolute;
  top:0;
  right:0;
  width:300px;
  height:150px;
  background:linear-gradient(45deg,#ff0000,#b71c1c,#ffd700);
  border-bottom-left-radius:100px;
}

.logo{
  position:absolute;
  top:40px;
  left:40px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#000,#333);
  color:#ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:bold;
  text-align:center;
  border:5px solid gold;
}

.cert h1{
  font-size:50px;
  color:#7b0000;
}

.name{
  font-size:40px;
  margin:20px 0;
  font-weight:bold;
}

.sign{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

.sign hr{
  width:150px;
}

/* ID CARD */
#idcard{
  width:320px;
  height:200px;
  display:none;
}

.id-box{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
}

.id-header{
  background:#ff5722;
  color:white;
  padding:5px;
  border-radius:5px;
}

#photo{
  width:80px;
  height:80px;
  border-radius:50%;
}

</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="course" placeholder="Course"><br>
<input type="text" id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<button onclick="showCertificate()">Preview Certificate</button>
<button onclick="downloadCertificate()">Download Certificate</button><br>

<button onclick="showID()">Preview ID Card</button>
<button onclick="downloadID()">Download ID Card</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert">
    <div class="top-design"></div>
    <div class="logo">GCIT<br>FOUNDATION</div>

    <h1>CERTIFICATE</h1>
    <p>This is to certify</p>

    <h2 id="c_name" class="name"></h2>

    <p>Completed course</p>
    <h3 id="c_course"></h3>

    <div class="sign">
      <h3 style="font-family:cursive;">Upesh Kumar</h3>
      <hr>
      <span>Director</span>
    </div>
  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">

    <div class="id-header">GCIT FOUNDATION</div>

    <img id="photo"><br>

    <h3 id="i_name"></h3>
    <p id="i_course"></p>

    <p style="font-weight:bold;">
      Student ID: <span id="i_id"></span>
    </p>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

// CERTIFICATE PREVIEW
function showCertificate(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;

  document.getElementById("c_name").innerText = name;
  document.getElementById("c_course").innerText = course;

  document.getElementById("certificate").style.display = "block";
}

// DOWNLOAD CERTIFICATE
function downloadCertificate(){
  html2canvas(document.getElementById("certificate")).then(canvas=>{
    let pdf = new jsPDF('landscape');
    pdf.addImage(canvas.toDataURL("image/png"),'PNG',10,10,280,150);
    pdf.save("certificate.pdf");
  });
}

// ID PREVIEW
function showID(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;
  let id = document.getElementById("id").value;

  let file = document.getElementById("photoInput").files[0];
  let reader = new FileReader();

  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
    document.getElementById("i_name").innerText = name;
    document.getElementById("i_course").innerText = course;
    document.getElementById("i_id").innerText = id;

    document.getElementById("idcard").style.display = "block";
  }

  if(file) reader.readAsDataURL(file);
}

// DOWNLOAD ID
function downloadID(){
  html2canvas(document.getElementById("idcard")).then(canvas=>{
    let pdf = new jsPDF();
    pdf.addImage(canvas.toDataURL("image/png"),'PNG',10,10,80,50);
    pdf.save("idcard.pdf");
  });
}
</script>

</body>
</html>
