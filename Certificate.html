<!DOCTYPE html>
<html>
<head>
<title>GCIT Admin Panel</title>

<!-- LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  text-align:center;
  padding:20px;
}

input{
  padding:10px;
  margin:8px;
  width:250px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* ================= CERTIFICATE ================= */
#certificate{
  width:1000px;
  height:600px;
  display:none;
}

.cert{
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#fff,#f7f7f7);
  border:12px solid gold;
  position:relative;
  text-align:center;
  padding:40px;
  box-sizing:border-box;
  overflow:hidden;
}

/* TOP DESIGN */
.top-design{
  position:absolute;
  top:0;
  right:0;
  width:300px;
  height:150px;
  background:linear-gradient(45deg,#ff0000,#b71c1c,#ffd700);
  border-bottom-left-radius:100px;
}

/* LOGO */
.logo{
  position:absolute;
  top:40px;
  left:40px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#000,#333);
  color:#ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:bold;
  text-align:center;
  border:5px solid gold;
}

/* TEXT */
.cert h1{
  font-size:50px;
  color:#7b0000;
  letter-spacing:5px;
}

.cert h2{
  color:#7b0000;
  margin:5px 0;
}

.sub{
  margin-top:20px;
  font-size:18px;
}

.name{
  font-size:40px;
  margin:20px 0;
  font-weight:bold;
}

.desc{
  width:70%;
  margin:auto;
  font-size:16px;
  color:#444;
}

/* SIGN */
.sign{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

.sign hr{
  width:150px;
}

/* ================= ID CARD ================= */
#idcard{
  width:320px;
  height:200px;
  display:none;
}

.id-box{
  width:100%;
  height:100%;
  background:white;
  color:black;
  border-radius:10px;
  text-align:center;
  padding:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.id-header{
  background:#ff5722;
  color:white;
  padding:5px;
  font-weight:bold;
  border-radius:5px;
}

#photo{
  width:80px;
  height:80px;
  border-radius:50%;
  margin:10px 0;
}

.id-footer{
  margin-top:10px;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<h2>🎓 GCIT Admin Panel</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="course" placeholder="Course"><br>
<input type="text" id="id" placeholder="Student ID"><br>
<input type="file" id="photoInput"><br>

<button onclick="generateCertificate()">🎓 Generate Certificate</button>
<button onclick="generateID()">🪪 Generate ID Card</button>

<!-- CERTIFICATE -->
<div id="certificate">
  <div class="cert">

    <div class="top-design"></div>

    <div class="logo">
      GCIT<br>FOUNDATION
    </div>

    <h1>CERTIFICATE</h1>
    <h2>OF ACHIEVEMENT</h2>

    <p class="sub">This Certificate Is Proudly Presented To</p>

    <h2 id="c_name" class="name"></h2>

    <p class="desc">
      This certificate is awarded for successfully completing the course
      <b id="c_course"></b> and demonstrating excellent performance.
    </p>

    <div class="sign">
      <p>Signature</p>
      <hr>
      <span>Director</span>
    </div>

  </div>
</div>

<!-- ID CARD -->
<div id="idcard">
  <div class="id-box">

    <div class="id-header">
      GCIT FOUNDATION
    </div>

    <img src="" id="photo">

    <h3 id="i_name"></h3>
    <p id="i_course"></p>
    <p>ID: <span id="i_id"></span></p>

    <div class="id-footer">
      Valid Till: 2026
    </div>

  </div>
</div>

<script>
const { jsPDF } = window.jspdf;

// LOAD PHOTO
function loadPhoto(callback){
  let file = document.getElementById("photoInput").files[0];
  if(!file){
    alert("Upload photo first");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
    callback();
  }
  reader.readAsDataURL(file);
}

// CERTIFICATE
function generateCertificate(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;
  let id = document.getElementById("id").value;

  if(!name || !course || !id){
    alert("Fill all fields");
    return;
  }

  document.getElementById("c_name").innerText = name;
  document.getElementById("c_course").innerText = course;

  let cert = document.getElementById("certificate");
  cert.style.display = "block";

  html2canvas(cert).then(canvas=>{
    let img = canvas.toDataURL("image/png");
    let pdf = new jsPDF('landscape');
    pdf.addImage(img,'PNG',10,10,280,150);
    pdf.save(name+"_certificate.pdf");
  });
}

// ID CARD
function generateID(){
  let name = document.getElementById("name").value;
  let course = document.getElementById("course").value;
  let id = document.getElementById("id").value;

  if(!name || !course || !id){
    alert("Fill all fields");
    return;
  }

  loadPhoto(function(){
    document.getElementById("i_name").innerText = name;
    document.getElementById("i_course").innerText = course;
    document.getElementById("i_id").innerText = id;

    let card = document.getElementById("idcard");
    card.style.display = "block";

    html2canvas(card).then(canvas=>{
      let img = canvas.toDataURL("image/png");
      let pdf = new jsPDF();
      pdf.addImage(img,'PNG',10,10,80,50);
      pdf.save(name+"_idcard.pdf");
    });
  });
}
</script>

</body>
</html>
